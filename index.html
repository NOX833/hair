<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Glam Salon</title>

<style>
:root {
    --primary: #d4af37;
    --primary-dark: #9b7b18;
    --bg-main: #fff7fb;
    --bg-card: #ffffff;
    --text-main: #222;
    --text-muted: #666;
    --border-color: #f1d6e5;
    --danger: #dc3545;
    --glass-light: rgba(255, 255, 255, 0.85);
    --glass-border: rgba(212, 175, 55, 0.2);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    background: linear-gradient(135deg, #fff7fb 0%, #fef1f7 100%);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

header {
    background: linear-gradient(180deg, #111 0%, #1a1a1a 100%);
    border-bottom: 3px solid var(--primary);
    padding: 1.2rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
}

.logo {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: 0.5px;
}

.cart-btn {
    background: linear-gradient(135deg, var(--primary) 0%, #c99d22 100%);
    color: #111;
    border: 2px solid rgba(255, 255, 255, 0.3);
    padding: 0.7rem 1.4rem;
    font-size: 1rem;
    font-weight: 700;
    border-radius: 30px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
    transition: all 0.3s ease;
}

.cart-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
}

#cart-count {
    background: #111;
    color: var(--primary);
    padding: 2px 8px;
    border-radius: 50%;
    font-size: 0.85rem;
    font-weight: bold;
}

.hero {
    background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
    url("https://images.unsplash.com/photo-1560066984-138dadb4c035?auto=format&fit=crop&w=1400&q=80");
    background-size: cover;
    background-position: center;
    color: white;
    text-align: center;
    padding: 6rem 1rem;
    position: relative;
}

.hero::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(180deg, transparent 0%, rgba(212, 175, 55, 0.05) 100%);
    pointer-events: none;
}

.hero h1 {
    font-size: 3.2rem;
    color: var(--primary);
    margin-bottom: 1rem;
    text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3);
    letter-spacing: 1px;
}

.hero p {
    font-size: 1.3rem;
    margin-bottom: 1.5rem;
    text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.3);
}

.hero a {
    background: linear-gradient(135deg, var(--primary) 0%, #c99d22 100%);
    color: #111;
    padding: 1rem 2rem;
    text-decoration: none;
    border-radius: 30px;
    font-weight: bold;
    display: inline-block;
    box-shadow: 0 6px 20px rgba(212, 175, 55, 0.3);
    transition: all 0.3s ease;
    border: 2px solid transparent;
}

.hero a:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4);
}

.container {
    display: flex;
    padding: 2.5rem 2rem;
    gap: 2.5rem;
    max-width: 1400px;
    margin: 0 auto;
    flex: 1;
}

.products-section {
    flex: 3;
}

.section-title {
    margin-bottom: 2rem;
    font-size: 2.2rem;
    color: #111;
    position: relative;
    padding-bottom: 1rem;
}

.section-title::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, var(--primary), transparent);
    border-radius: 2px;
}

.products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 2rem;
}

.product-card {
    background: var(--glass-light);
    backdrop-filter: blur(15px);
    border: 2px solid var(--glass-border);
    border-radius: 20px;
    padding: 1.5rem;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

.product-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
    transition: left 0.6s ease;
    pointer-events: none;
}

.product-card:hover {
    transform: translateY(-6px);
    border-color: var(--primary);
    box-shadow: 0 12px 32px rgba(212, 175, 55, 0.15);
}

.product-card:hover::before {
    left: 100%;
}

.product-img-placeholder {
    height: 200px;
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 1.2rem;
    background: linear-gradient(135deg, #f0e6d2 0%, #fff7fb 100%);
    border: 1px solid var(--glass-border);
    box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.1);
}

.product-img-placeholder img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.4s ease;
}

.product-card:hover .product-img-placeholder img {
    transform: scale(1.05);
}

.product-title {
    font-size: 1.15rem;
    font-weight: 700;
    margin-bottom: 0.6rem;
    color: #111;
}

.product-desc {
    font-size: 0.9rem;
    color: var(--text-muted);
    margin-bottom: 1rem;
    line-height: 1.5;
}

.product-price {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 1rem;
}

.btn-add {
    width: 100%;
    background: linear-gradient(135deg, #111 0%, #2a2a2a 100%);
    color: var(--primary);
    border: 2px solid var(--primary);
    padding: 0.8rem;
    border-radius: 25px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
}

.btn-add:hover {
    background: linear-gradient(135deg, var(--primary) 0%, #c99d22 100%);
    color: #111;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(212, 175, 55, 0.25);
}

.cart-sidebar {
    flex: 1;
    background: var(--glass-light);
    backdrop-filter: blur(20px);
    border: 2px solid var(--glass-border);
    border-radius: 20px;
    padding: 2rem;
    height: fit-content;
    position: sticky;
    top: 110px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
}

.cart-title {
    font-size: 1.35rem;
    color: var(--primary);
    border-bottom: 2px solid var(--glass-border);
    padding-bottom: 0.8rem;
    margin-bottom: 1.2rem;
    font-weight: 700;
}

.cart-items-list {
    list-style: none;
    max-height: 350px;
    overflow-y: auto;
    margin-bottom: 1.5rem;
}

.cart-items-list::-webkit-scrollbar {
    width: 6px;
}

.cart-items-list::-webkit-scrollbar-track {
    background: rgba(212, 175, 55, 0.1);
    border-radius: 10px;
}

.cart-items-list::-webkit-scrollbar-thumb {
    background: var(--primary);
    border-radius: 10px;
}

.cart-item {
    display: flex;
    justify-content: space-between;
    padding: 0.8rem 0;
    border-bottom: 1px solid rgba(212, 175, 55, 0.1);
    transition: all 0.2s ease;
}

.cart-item:hover {
    background: rgba(212, 175, 55, 0.05);
    padding-left: 0.5rem;
}

.btn-remove {
    background: transparent;
    color: var(--danger);
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.2s ease;
}

.btn-remove:hover {
    color: #ff4555;
    transform: scale(1.1);
}

.cart-summary {
    border-top: 2px solid var(--glass-border);
    padding-top: 1.2rem;
}

.summary-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 0.8rem;
    font-weight: 500;
    color: var(--text-main);
}

.total-row {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--primary);
    padding-top: 0.8rem;
    border-top: 1px solid var(--glass-border);
}

.btn-checkout {
    width: 100%;
    background: linear-gradient(135deg, var(--primary) 0%, #c99d22 100%);
    color: #111;
    border: 2px solid transparent;
    padding: 1rem;
    border-radius: 25px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 1.2rem;
    box-shadow: 0 6px 20px rgba(212, 175, 55, 0.3);
    transition: all 0.3s ease;
    font-size: 1.05rem;
}

.btn-checkout:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4);
}

.btn-checkout:disabled {
    background: #ccc;
    color: #999;
    cursor: not-allowed;
    box-shadow: none;
}

.site-footer {
    text-align: center;
    padding: 2rem;
    background: linear-gradient(180deg, transparent 0%, rgba(212, 175, 55, 0.05) 100%);
    border-top: 2px solid var(--glass-border);
    margin-top: 3rem;
}

.footer-content {
    font-size: 0.95rem;
}

.footer-text {
    color: var(--text-muted);
    margin-bottom: 0.5rem;
}

.footer-credits {
    display: flex;
    justify-content: center;
    gap: 0.3rem;
    flex-wrap: wrap;
}

.footer-credits a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 600;
    transition: all 0.3s ease;
}

.footer-credits a:hover {
    text-decoration: underline;
    text-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
}

.footer-divider {
    color: var(--text-muted);
    margin: 0 0.5rem;
}

@media (max-width: 900px) {
    .container {
        flex-direction: column;
    }

    .hero h1 {
        font-size: 2.2rem;
    }

    header {
        flex-direction: column;
        gap: 1rem;
    }

    .cart-sidebar {
        position: static;
    }
}
</style>
</head>

<body>

<header>
    <div class="logo">💇 Luxury Glam Salon</div>
    <button class="cart-btn" onclick="scrollToCart()">
        🛒 Booking List <span id="cart-count">0</span>
    </button>
</header>

<section class="hero">
    <h1>Hair Styles, Barber & Nails</h1>
    <p>Look fresh, clean and beautiful with our professional salon services.</p>
    <a href="#services">View Services</a>
</section>

<div class="container" id="services">

<section class="products-section">
    <h2 class="section-title">Our Services</h2>
    <div class="products-grid" id="products-container"></div>
</section>

<aside class="cart-sidebar" id="cart-section">
    <h2 class="cart-title">Booking Summary</h2>
    <ul class="cart-items-list" id="cart-items"></ul>

    <div class="cart-summary">
        <div class="summary-row">
            <span>Subtotal:</span>
            <span id="subtotal-price">R0.00</span>
        </div>

        <div class="summary-row">
            <span>Service Fee:</span>
            <span id="tax-price">R0.00</span>
        </div>

        <div class="summary-row total-row">
            <span>Total:</span>
            <span id="total-price">R0.00</span>
        </div>

        <button class="btn-checkout" id="checkout-btn" disabled onclick="processCheckout()">
            Book on WhatsApp
        </button>
    </div>
</aside>

</div>

<footer class="site-footer">
    <div class="footer-content">
        <div class="footer-text">Luxury Glam Salon</div>
        <div class="footer-credits">
            <span>Created by</span>
            <a href="#" title="Professional Solutions">Submitpro</a>
            <span class="footer-divider">×</span>
            <a href="#" title="Designer & Developer">Noxolo Nyatela</a>
        </div>
    </div>
</footer>

<script>
const PRODUCTS = [
    {
        id: 101,
        name: "Straight Back Cornrows",
        price: 250,
        category: "Hair Styles",
        image: "https://i.postimg.cc/G2bnzPK5/condrow.jpg",
        desc: "Neat and stylish cornrows for everyday beauty."
    },
    {
        id: 102,
        name: "Wig Installation",
        price: 200,
        category: "Hair Styles",
        image: "https://i.postimg.cc/pTybgVNp/wig-instalation.jpg",
        desc: "Clean wig installation with a natural-looking finish."
    },
    {
        id: 103,
        name: "Wash & Blow Dry",
        price: 120,
        category: "Hair Styles",
        image: "https://i.postimg.cc/4NyPVK6m/hai-wash-and-blow-dry.jpg",
        desc: "Hair wash, treatment and blow dry styling."
    },
    {
        id: 104,
        name: "Men's & kids Fade Cut",
        price: 100,
        category: "Barber",
        image: "https://i.postimg.cc/MT4bzwTm/fade.jpg",
        desc: "Fresh fade haircut for a clean and sharp look."
    },
    {
        id: 105,
        name: "Beard Trim",
        price: 50,
        category: "Barber",
        image: "https://images.unsplash.com/photo-1503951914875-452162b0f3f1?auto=format&fit=crop&w=700&q=80",
        desc: "Professional beard shaping and trimming."
    },
    {
        id: 106,
        name: "Kids Haircut",
        price: 80,
        category: "Barber",
        image: "https://images.unsplash.com/photo-1599351431202-1e0f0137899a?auto=format&fit=crop&w=700&q=80",
        desc: "Simple and neat haircut for young boys."
    },
    {
        id: 107,
        name: "Gel Nails",
        price: 180,
        category: "Nails",
        image: "https://images.unsplash.com/photo-1604654894610-df63bc536371?auto=format&fit=crop&w=700&q=80",
        desc: "Beautiful gel polish for a glossy finish."
    },
    {
        id: 108,
        name: "Acrylic Nails",
        price: 250,
        category: "Nails",
        image: "https://images.unsplash.com/photo-1610992015732-2449b76344bc?auto=format&fit=crop&w=700&q=80",
        desc: "Strong and stylish acrylic nail set."
    },
    {
        id: 109,
        name: "Pedicure",
        price: 150,
        category: "Nails",
        image: "https://images.unsplash.com/photo-1519014816548-bf5fe059798b?auto=format&fit=crop&w=700&q=80",
        desc: "Relaxing foot care and polish service."
    }
];

let cart = [];

function initStore() {
    const container = document.getElementById('products-container');
    container.innerHTML = '';

    PRODUCTS.forEach(product => {
        const card = document.createElement('div');
        card.className = 'product-card';

        card.innerHTML = `
            <div>
                <div class="product-img-placeholder">
                    <img src="${product.image}" alt="${product.name}">
                </div>
                <h3 class="product-title">${product.name}</h3>
                <p class="product-desc">${product.desc}</p>
            </div>
            <div>
                <p class="product-price">R${product.price.toFixed(2)}</p>
                <button class="btn-add" onclick="addToCart(${product.id})">Add To Booking</button>
            </div>
        `;

        container.appendChild(card);
    });

    updateCartUI();
}

function addToCart(productId) {
    const product = PRODUCTS.find(p => p.id === productId);
    const existingItem = cart.find(item => item.id === productId);

    if (existingItem) {
        existingItem.quantity += 1;
    } else {
        cart.push({ ...product, quantity: 1 });
    }

    updateCartUI();
}

function removeFromCart(productId) {
    cart = cart.filter(item => item.id !== productId);
    updateCartUI();
}

function updateCartUI() {
    const cartItemsContainer = document.getElementById('cart-items');
    const cartCount = document.getElementById('cart-count');
    const subtotalEl = document.getElementById('subtotal-price');
    const taxEl = document.getElementById('tax-price');
    const totalEl = document.getElementById('total-price');
    const checkoutBtn = document.getElementById('checkout-btn');

    cartItemsContainer.innerHTML = '';

    let totalItems = 0;
    let subtotal = 0;

    if (cart.length === 0) {
        cartItemsContainer.innerHTML = `<li style="color: var(--text-muted); font-style: italic; padding: 1rem 0;">No salon service selected yet.</li>`;
    } else {
        cart.forEach(item => {
            totalItems += item.quantity;
            subtotal += item.price * item.quantity;

            const li = document.createElement('li');
            li.className = 'cart-item';

            li.innerHTML = `
                <div>
                    <strong>${item.name}</strong><br>
                    <span style="font-size:0.85rem; color:var(--text-muted);">
                        Qty: ${item.quantity} × R${item.price.toFixed(2)}
                    </span>
                </div>
                <button class="btn-remove" onclick="removeFromCart(${item.id})">Remove</button>
            `;

            cartItemsContainer.appendChild(li);
        });
    }

    const serviceFee = subtotal * 0.05;
    const total = subtotal + serviceFee;

    cartCount.innerText = totalItems;
    subtotalEl.innerText = `R${subtotal.toFixed(2)}`;
    taxEl.innerText = `R${serviceFee.toFixed(2)}`;
    totalEl.innerText = `R${total.toFixed(2)}`;

    checkoutBtn.disabled = cart.length === 0;
}

function scrollToCart() {
    document.getElementById('cart-section').scrollIntoView({ behavior: 'smooth' });
}

function processCheckout() {
    let message = "Hello Luxury Glam Salon,%0A%0AI would like to book the following salon services:%0A%0A";

    cart.forEach(item => {
        message += "- " + item.name + " x" + item.quantity + " = R" + (item.price * item.quantity).toFixed(2) + "%0A";
    });

    const subtotal = document.getElementById("subtotal-price").innerText;
    const serviceFee = document.getElementById("tax-price").innerText;
    const total = document.getElementById("total-price").innerText;

    message += "%0ASubtotal: " + subtotal;
    message += "%0AService Fee: " + serviceFee;
    message += "%0ATotal: " + total;
    message += "%0A%0APlease confirm available date and time.";

    window.open("https://wa.me/27605623095?text=" + message, "_blank");
}

window.onload = initStore;
</script>

</body>
</html>
